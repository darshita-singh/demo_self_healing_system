name: PR - Jira Sync workflow

on:
  pull_request:
    types:
      - opened
      - reopened
      - closed
      - ready_for_review
  pull_request_review:
    types:
      - submitted


jobs:
  update-jira-ticket:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout pr-jira-sync repo
        uses: actions/checkout@v4
        with:
          repository: Basavaraj011/pr-jira-sync
          ref: main
          path: pr-jira-sync
 
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pr-jira-sync/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install pr-jira-sync dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pr-jira-sync/requirements.txt

      - name: Print PR metadata
        run: |
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "PR Title: ${{ github.event.pull_request.title }}"
          echo "PR Description: ${{ github.event.pull_request.body }}"
          echo "Source Branch: ${{ github.head_ref }}"
          echo "Target Branch: ${{ github.base_ref }}"
          echo "PR Author: ${{ github.event.pull_request.user.login }}"
          echo "Is Merged: ${{ github.event.pull_request.merged }}"

      - name: Extract Jira Key
        run: |
          echo "JIRA_KEY=$(echo '${{ github.head_ref }}' | grep -oE '[A-Z]+-[0-9]+')" >> $GITHUB_ENV

      - name: Show Jira Key
        run: |
          echo "Jira Issue Key: $JIRA_KEY" 
      
      - name: Set Jira Status
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ] && [ "${{ github.event.review.state }}" = "approved" ]; then
            echo "TICKET_STATUS=Review" >> $GITHUB_ENV
          elif [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            echo "TICKET_STATUS=Done" >> $GITHUB_ENV
          else
            echo "TICKET_STATUS=In Progress" >> $GITHUB_ENV
          fi

      - name: Debug Vars
        run: |
          echo "JIRA_KEY : $JIRA_KEY"
          echo "TICKET_STATUS : $TICKET_STATUS"

      - name: Update Jira ticket
        env:
          JIRA_KEY: ${{ env.JIRA_KEY }}
          TICKET_STATUS: ${{ env.TICKET_STATUS }}
        run: |
          python pr-jira-sync/scripts/jira_ticket_status_updater.py
